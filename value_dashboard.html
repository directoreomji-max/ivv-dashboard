<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메트라이프 가치주식형 2호 Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060D14; font-family: 'Courier New', monospace; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0B1623; }
    ::-webkit-scrollbar-thumb { background: #3A5A7F; border-radius: 3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const {
      LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer,
      BarChart, Bar, Cell, ReferenceLine
    } = Recharts;

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxb2syQZzhFMQI_pBvteCJ75-ZCLFvPVeb1jFR71rrps9TiK-NVWL0iMO9HdViG6N-7/exec";
    const GOLD = "#E2B96A";

    const STOCK_COLORS = {
      "삼성전자":           "#3B82F6",
      "SK하이닉스":         "#8B5CF6",
      "KB금융":             "#10B981",
      "한화에어로스페이스":  "#F59E0B",
      "삼성물산":           "#EF4444",
      "HD한국조선해양":     "#06B6D4",
      "두산에너빌리티":     "#F97316",
      "LG에너지솔루션":     "#84CC16",
      "삼성바이오로직스":   "#EC4899",
    };

    const card = { background:"rgba(14,28,46,0.7)", border:"1px solid #2A4A6F", borderRadius:14, padding:20 };

    function parseNum(v) {
      if (v === null || v === undefined || v === "") return null;
      if (typeof v === "number") return v;
      return parseFloat(String(v).replace(/[,\+%]/g,"")) || null;
    }

    function RateBadge({ val, size=14 }) {
      const n = parseNum(val);
      if (n === null) return <span style={{color:"#4A6580"}}>-</span>;
      const pos = n >= 0;
      return <span style={{color:pos?"#10B981":"#EF4444", fontWeight:800, fontSize:size}}>{pos?"▲":"▼"} {Math.abs(n).toFixed(2)}%</span>;
    }

    function ChartTooltip({ active, payload, label }) {
      if (!active || !payload || !payload.length) return null;
      return (
        <div style={{background:"#0F1923",border:"1px solid #3A5A7F",borderRadius:8,padding:"10px 14px",fontSize:12}}>
          <div style={{color:"#94A3B8",marginBottom:6}}>{label}</div>
          {payload.map(p => (
            <div key={p.dataKey} style={{color:p.color,fontWeight:700,marginBottom:2}}>
              {p.dataKey}: {typeof p.value==="number" ? p.value.toFixed(2)+"%" : p.value}
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [rawData, setRawData]     = useState([]);
      const [loading, setLoading]     = useState(true);
      const [error, setError]         = useState(null);
      const [activeTab, setActiveTab] = useState("overview");
      const [selectedStock, setSelectedStock] = useState(null);
      const [dateRange, setDateRange] = useState("1M");
      const [editMode, setEditMode]   = useState(false);
      const [customStocks, setCustomStocks] = useState(null);

      useEffect(() => {
        fetch(APPS_SCRIPT_URL)
          .then(r => r.json())
          .then(json => { if (json.success) setRawData(json.data||[]); else setError("데이터 로드 실패"); })
          .catch(() => setError("서버 연결 실패"))
          .finally(() => setLoading(false));
      }, []);

      const stockNames = useMemo(() => {
        if (customStocks) return customStocks;
        return [...new Set(rawData.map(d=>d["종목명"]))].filter(Boolean);
      }, [rawData, customStocks]);

      const filteredData = useMemo(() => {
        if (!rawData.length) return [];
        const now = new Date();
        const cutoff = new Date(now);
        if      (dateRange==="1W") cutoff.setDate(now.getDate()-7);
        else if (dateRange==="1M") cutoff.setMonth(now.getMonth()-1);
        else if (dateRange==="3M") cutoff.setMonth(now.getMonth()-3);
        else if (dateRange==="6M") cutoff.setMonth(now.getMonth()-6);
        else cutoff.setFullYear(now.getFullYear()-1);
        return rawData.filter(d => new Date(d["날짜"]) >= cutoff);
      }, [rawData, dateRange]);

      const dates = useMemo(() =>
        [...new Set(filteredData.map(d=>d["날짜"]))].sort()
      , [filteredData]);

      const latestDate = dates[dates.length-1];

      const returnSeries = useMemo(() => {
        const series = {};
        stockNames.forEach(name => {
          const sd = filteredData.filter(d=>d["종목명"]===name).sort((a,b)=>new Date(a["날짜"])-new Date(b["날짜"]));
          if (!sd.length) return;
          const base = parseNum(sd[0]["종가"]);
          if (!base) return;
          series[name] = sd.map(d => ({
            date:   d["날짜"],
            return: parseNum(d["종가"]) ? +((parseNum(d["종가"])/base-1)*100).toFixed(2) : null,
            price:  parseNum(d["종가"]),
            rate:   d["등락률"],
          }));
        });
        return series;
      }, [filteredData, stockNames]);

      const latestData = useMemo(() =>
        stockNames.map(name => filteredData.find(d=>d["종목명"]===name&&d["날짜"]===latestDate) || {종목명:name})
      , [filteredData, stockNames, latestDate]);

      const multiChartData = useMemo(() =>
        dates.map(date => {
          const pt = { date: date.slice(5) };
          stockNames.forEach(name => {
            const s = returnSeries[name];
            const f = s?.find(d=>d.date===date);
            if (f) pt[name] = f.return;
          });
          return pt;
        })
      , [dates, stockNames, returnSeries]);

      const todayBarData = useMemo(() =>
        latestData.map(d => ({
          name:  d["종목명"],
          rate:  parseNum(d["등락률"]),
          price: parseNum(d["종가"]),
          diff:  d["전일비"],
        })).sort((a,b) => (b.rate||0)-(a.rate||0))
      , [latestData]);

      const selectedSeries = selectedStock ? (returnSeries[selectedStock]||[]) : [];

      // 기간 수익률 정렬용
      const rankedStocks = useMemo(() =>
        stockNames.map(name => ({
          name,
          ret: returnSeries[name]?.slice(-1)[0]?.return ?? null,
        })).sort((a,b) => (b.ret||0)-(a.ret||0))
      , [stockNames, returnSeries]);

      const maxAbsRet = useMemo(() =>
        Math.max(...rankedStocks.map(s => Math.abs(s.ret||0)), 1)
      , [rankedStocks]);

      if (loading) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"#060D14"}}>
          <div style={{width:52,height:52,borderRadius:12,background:"linear-gradient(135deg,#E2B96A,#C8962E)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:11,color:"#060D14",animation:"pulse 1.4s infinite",textAlign:"center",lineHeight:1.3}}>가치<br/>주식</div>
          <div style={{color:"#94A3B8",fontSize:13,letterSpacing:3}}>LOADING...</div>
        </div>
      );

      if (error) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#EF4444",fontSize:14,background:"#060D14"}}>⚠ {error}</div>
      );

      if (!rawData.length) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#94A3B8",fontSize:14,background:"#060D14",flexDirection:"column",gap:12}}>
          <div style={{fontSize:32}}>📭</div>
          <div>아직 수집된 데이터가 없어요</div>
          <div style={{fontSize:12,color:"#4A6580"}}>매일 오후 4시 이후 데이터가 쌓여요</div>
        </div>
      );

      return (
        <div style={{background:"linear-gradient(135deg,#060D14 0%,#0B1623 50%,#0E1C2E 100%)",minHeight:"100vh",color:"#F1F5F9"}}>

          {/* 헤더 */}
          <div style={{borderBottom:"1px solid #2A4A6F",background:"rgba(14,28,46,0.92)",position:"sticky",top:0,zIndex:100,padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#E2B96A,#C8962E)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:10,color:"#060D14",textAlign:"center",lineHeight:1.3}}>메트<br/>라이프</div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:"#FFFFFF"}}>메트라이프 가치주식형 2호</div>
                <div style={{fontSize:10,color:"#94A3B8",letterSpacing:2}}>HOLDINGS TRACKER · 코스피 TOP9</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setEditMode(!editMode)} style={{background:editMode?"rgba(226,185,106,0.2)":"rgba(42,74,111,0.4)",border:"1px solid "+(editMode?GOLD:"#2A4A6F"),borderRadius:6,padding:"5px 12px",fontSize:11,color:editMode?GOLD:"#CBD5E1",cursor:"pointer",fontFamily:"inherit"}}>
                ✎ 종목 편집
              </button>
              <div style={{padding:"5px 10px",borderRadius:6,background:"rgba(16,185,129,0.15)",border:"1px solid rgba(16,185,129,0.4)",fontSize:11,color:"#10B981",fontWeight:700}}>● LIVE</div>
            </div>
          </div>

          {/* 편집 패널 */}
          {editMode && (
            <div style={{background:"rgba(226,185,106,0.08)",borderBottom:"1px solid rgba(226,185,106,0.3)",padding:"16px 28px"}}>
              <div style={{fontSize:12,color:GOLD,marginBottom:10,fontWeight:700}}>▸ 추적 종목 편집 (쉼표로 구분)</div>
              <textarea
                defaultValue={stockNames.join(", ")}
                onChange={e=>setCustomStocks(e.target.value.split(",").map(s=>s.trim()).filter(Boolean))}
                style={{width:"100%",background:"#0F1923",border:"1px solid #3A5A7F",borderRadius:8,padding:"10px 14px",color:"#FFFFFF",fontSize:12,fontFamily:"inherit",resize:"vertical",minHeight:56}}
              />
              <div style={{fontSize:11,color:"#94A3B8",marginTop:6}}>※ KOSPI_200 시트에 있는 종목명과 정확히 일치해야 해요</div>
            </div>
          )}

          {/* 오늘 현황 배너 */}
          <div style={{padding:"16px 28px",borderBottom:"1px solid #2A4A6F",background:"rgba(6,13,20,0.5)"}}>
            <div style={{fontSize:10,color:"#94A3B8",letterSpacing:2,marginBottom:10}}>TODAY · {latestDate||"-"}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(138px,1fr))",gap:8}}>
              {todayBarData.map(d => {
                const pos = (d.rate||0) >= 0;
                return (
                  <div key={d.name} onClick={()=>{setSelectedStock(d.name);setActiveTab("detail");}}
                    style={{background:pos?"rgba(16,185,129,0.07)":"rgba(239,68,68,0.07)",border:"1px solid "+(pos?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"),borderRadius:10,padding:"10px 12px",cursor:"pointer"}}>
                    <div style={{fontSize:11,color:"#FFFFFF",fontWeight:700,marginBottom:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.name}</div>
                    <div style={{fontSize:12,color:"#94A3B8",marginBottom:3}}>{d.price?d.price.toLocaleString():"-"}원</div>
                    <RateBadge val={d.rate} size={12}/>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 탭 + 날짜범위 */}
          <div style={{padding:"0 28px",borderBottom:"1px solid #2A4A6F",background:"rgba(6,13,20,0.7)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex"}}>
              {[
                {id:"overview", label:"수익률 비교"},
                {id:"today",    label:"오늘 등락"},
                {id:"detail",   label: selectedStock ? `${selectedStock} 상세` : "종목 상세"},
              ].map(tab => (
                <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"13px 16px",fontSize:12,fontFamily:"inherit",fontWeight:activeTab===tab.id?700:400,color:activeTab===tab.id?GOLD:"#CBD5E1",borderBottom:activeTab===tab.id?"2px solid "+GOLD:"2px solid transparent",marginBottom:-1,transition:"all 0.2s"}}>
                  {tab.label}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:5}}>
              {["1W","1M","3M","6M","1Y"].map(r => (
                <button key={r} onClick={()=>setDateRange(r)} style={{background:dateRange===r?"rgba(226,185,106,0.2)":"transparent",border:"1px solid "+(dateRange===r?GOLD:"#2A4A6F"),borderRadius:6,padding:"4px 9px",fontSize:11,color:dateRange===r?GOLD:"#94A3B8",cursor:"pointer",fontFamily:"inherit",fontWeight:dateRange===r?700:400}}>
                  {r}
                </button>
              ))}
            </div>
          </div>

          {/* 컨텐츠 */}
          <div style={{padding:"24px 28px"}}>

            {/* ── 수익률 비교 ── */}
            {activeTab==="overview" && (
              <div className="fade-in">
                <div style={{...card, marginBottom:20}}>
                  <div style={{fontSize:13,color:GOLD,fontWeight:700,letterSpacing:1,marginBottom:16}}>▸ 기간 수익률 추이 ({dateRange})</div>
                  <ResponsiveContainer width="100%" height={300}>
                    <LineChart data={multiChartData} margin={{left:0,right:20,top:10}}>
                      <XAxis dataKey="date" tick={{fill:"#94A3B8",fontSize:10}} axisLine={false} tickLine={false} interval="preserveStartEnd"/>
                      <YAxis tick={{fill:"#94A3B8",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v+"%"}/>
                      <Tooltip content={<ChartTooltip/>}/>
                      <ReferenceLine y={0} stroke="#2A4A6F" strokeDasharray="3 3"/>
                      {stockNames.map(name => (
                        <Line key={name} type="monotone" dataKey={name}
                          stroke={STOCK_COLORS[name]||"#4A6580"} dot={false}
                          strokeWidth={selectedStock===name?3:1.5}
                          opacity={selectedStock&&selectedStock!==name?0.25:1}
                          activeDot={{r:4, onClick:()=>setSelectedStock(name)}}
                        />
                      ))}
                    </LineChart>
                  </ResponsiveContainer>
                </div>

                <div style={card}>
                  <div style={{fontSize:13,color:GOLD,fontWeight:700,letterSpacing:1,marginBottom:16}}>▸ 기간 수익률 순위</div>
                  {rankedStocks.map(({name, ret}) => {
                    const pos = (ret||0) >= 0;
                    return (
                      <div key={name} onClick={()=>{setSelectedStock(name);setActiveTab("detail");}} style={{marginBottom:14,cursor:"pointer"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:12,color:STOCK_COLORS[name]||GOLD}}>●</span>
                            <span style={{fontSize:13,color:"#FFFFFF",fontWeight:600}}>{name}</span>
                          </div>
                          <span style={{fontSize:14,fontWeight:800,color:pos?"#10B981":"#EF4444"}}>
                            {pos?"+":""}{ret?.toFixed(2)||"-"}%
                          </span>
                        </div>
                        <div style={{background:"#0B1623",borderRadius:6,height:6}}>
                          <div style={{width:(Math.abs(ret||0)/maxAbsRet*100)+"%",height:"100%",borderRadius:6,background:pos?"#10B981":"#EF4444",transition:"width 0.6s ease"}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── 오늘 등락 ── */}
            {activeTab==="today" && (
              <div className="fade-in" style={card}>
                <div style={{fontSize:13,color:GOLD,fontWeight:700,letterSpacing:1,marginBottom:16}}>▸ 오늘 등락률 · {latestDate}</div>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={todayBarData} margin={{left:10,right:20}}>
                    <XAxis dataKey="name" tick={{fill:"#FFFFFF",fontSize:10,fontWeight:700}} axisLine={false} tickLine={false}/>
                    <YAxis tick={{fill:"#94A3B8",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v+"%"}/>
                    <Tooltip formatter={v=>[v?.toFixed(2)+"%","등락률"]} contentStyle={{background:"#0F1923",border:"1px solid #2A4A6F",borderRadius:8,color:"#fff"}}/>
                    <ReferenceLine y={0} stroke="#2A4A6F"/>
                    <Bar dataKey="rate" radius={[4,4,0,0]}>
                      {todayBarData.map((d,i)=><Cell key={i} fill={(d.rate||0)>=0?"#10B981":"#EF4444"}/>)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>

                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginTop:20}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #2A4A6F"}}>
                      {["종목명","현재가","전일비","등락률"].map(h=>(
                        <th key={h} style={{padding:"8px",textAlign:"left",color:"#CBD5E1",fontWeight:600,fontSize:11}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {todayBarData.map((d,i)=>(
                      <tr key={i} onClick={()=>{setSelectedStock(d.name);setActiveTab("detail");}}
                        style={{borderBottom:"1px solid rgba(42,74,111,0.4)",cursor:"pointer",background:i%2===0?"transparent":"rgba(14,28,46,0.4)"}}>
                        <td style={{padding:"10px 8px"}}>
                          <span style={{color:STOCK_COLORS[d.name]||GOLD}}>● </span>
                          <span style={{color:"#FFFFFF",fontWeight:700}}>{d.name}</span>
                        </td>
                        <td style={{padding:"10px 8px",color:"#FFFFFF",fontWeight:700}}>{d.price?d.price.toLocaleString():"-"}원</td>
                        <td style={{padding:"10px 8px",color:(parseNum(d.diff)||0)>=0?"#10B981":"#EF4444"}}>{d.diff||"-"}</td>
                        <td style={{padding:"10px 8px"}}><RateBadge val={d.rate}/></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {/* ── 종목 상세 ── */}
            {activeTab==="detail" && (
              <div className="fade-in">
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
                  {stockNames.map(name=>(
                    <button key={name} onClick={()=>setSelectedStock(name)}
                      style={{background:selectedStock===name?(STOCK_COLORS[name]||GOLD):"rgba(14,28,46,0.7)",border:"1px solid "+(selectedStock===name?(STOCK_COLORS[name]||GOLD):"#2A4A6F"),borderRadius:8,padding:"6px 14px",fontSize:12,color:selectedStock===name?"#060D14":"#CBD5E1",cursor:"pointer",fontFamily:"inherit",fontWeight:selectedStock===name?800:400,transition:"all 0.2s"}}>
                      {name}
                    </button>
                  ))}
                </div>

                {selectedStock && selectedSeries.length > 0 ? (
                  <>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                      {[
                        {label:"현재가",  value: selectedSeries.slice(-1)[0]?.price?.toLocaleString()+"원", color:GOLD},
                        {label:"기간 수익률", value:(selectedSeries.slice(-1)[0]?.return>=0?"+":"")+selectedSeries.slice(-1)[0]?.return?.toFixed(2)+"%", color:selectedSeries.slice(-1)[0]?.return>=0?"#10B981":"#EF4444"},
                        {label:"오늘 등락", value:(todayBarData.find(d=>d.name===selectedStock)?.rate>=0?"+":"")+todayBarData.find(d=>d.name===selectedStock)?.rate?.toFixed(2)+"%"||"-", color:(todayBarData.find(d=>d.name===selectedStock)?.rate||0)>=0?"#10B981":"#EF4444"},
                        {label:"데이터 일수", value:selectedSeries.length+"일", color:"#94A3B8"},
                      ].map(item=>(
                        <div key={item.label} style={{...card,textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#94A3B8",marginBottom:6}}>{item.label}</div>
                          <div style={{fontSize:16,fontWeight:800,color:item.color||GOLD}}>{item.value}</div>
                        </div>
                      ))}
                    </div>

                    <div style={{...card,marginBottom:20}}>
                      <div style={{fontSize:13,color:STOCK_COLORS[selectedStock]||GOLD,fontWeight:700,letterSpacing:1,marginBottom:16}}>▸ {selectedStock} 주가 추이</div>
                      <ResponsiveContainer width="100%" height={240}>
                        <LineChart data={selectedSeries} margin={{left:0,right:20}}>
                          <XAxis dataKey="date" tick={{fill:"#94A3B8",fontSize:10}} axisLine={false} tickLine={false} interval="preserveStartEnd" tickFormatter={d=>d?.slice(5)}/>
                          <YAxis tick={{fill:"#94A3B8",fontSize:10}} axisLine={false} tickLine={false} domain={["auto","auto"]} tickFormatter={v=>v?.toLocaleString()}/>
                          <Tooltip formatter={v=>[v?.toLocaleString()+"원","주가"]} contentStyle={{background:"#0F1923",border:"1px solid #2A4A6F",borderRadius:8,color:"#fff"}}/>
                          <Line type="monotone" dataKey="price" stroke={STOCK_COLORS[selectedStock]||GOLD} dot={false} strokeWidth={2}/>
                        </LineChart>
                      </ResponsiveContainer>
                    </div>

                    <div style={card}>
                      <div style={{fontSize:13,color:STOCK_COLORS[selectedStock]||GOLD,fontWeight:700,letterSpacing:1,marginBottom:16}}>▸ {selectedStock} 기간 수익률 추이</div>
                      <ResponsiveContainer width="100%" height={200}>
                        <LineChart data={selectedSeries} margin={{left:0,right:20}}>
                          <XAxis dataKey="date" tick={{fill:"#94A3B8",fontSize:10}} axisLine={false} tickLine={false} interval="preserveStartEnd" tickFormatter={d=>d?.slice(5)}/>
                          <YAxis tick={{fill:"#94A3B8",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v+"%"}/>
                          <Tooltip formatter={v=>[v?.toFixed(2)+"%","수익률"]} contentStyle={{background:"#0F1923",border:"1px solid #2A4A6F",borderRadius:8,color:"#fff"}}/>
                          <ReferenceLine y={0} stroke="#2A4A6F" strokeDasharray="3 3"/>
                          <Line type="monotone" dataKey="return" stroke={STOCK_COLORS[selectedStock]||GOLD} dot={false} strokeWidth={2}/>
                        </LineChart>
                      </ResponsiveContainer>
                    </div>
                  </>
                ) : (
                  <div style={{...card,textAlign:"center",padding:40,color:"#94A3B8"}}>위에서 종목을 선택해주세요</div>
                )}
              </div>
            )}
          </div>

          {/* 푸터 */}
          <div style={{padding:"14px 28px",borderTop:"1px solid #2A4A6F",fontSize:11,color:"#64748B",display:"flex",justifyContent:"space-between"}}>
            <span>메트라이프 가치주식형 2호 · 네이버 금융 데이터 기준</span>
            <span>매일 오후 4시 자동 업데이트</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
