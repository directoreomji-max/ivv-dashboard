<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVV ETF Dashboard</title>

  <!-- React + Recharts CDN (설치 불필요) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060D14; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0B1623; }
    ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    select option { background: #0F1923; color: #E2B96A; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const {
      BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
      LineChart, Line, PieChart, Pie, Cell,
      CartesianGrid, Area, AreaChart
    } = Recharts;

    // ══════════════════════════════════════════════════════════════
    // ✅ Apps Script 배포 후 받은 URL을 여기에 붙여넣으세요
    // ══════════════════════════════════════════════════════════════
    const APPS_SCRIPT_URL = "여기에_웹앱_URL_붙여넣기";

    const SECTOR_COLORS = {
      "IT": "#3B82F6", "통신": "#8B5CF6", "소비재": "#F59E0B",
      "금융": "#10B981", "헬스케어": "#EF4444", "필수소비재": "#06B6D4",
      "산업재": "#F97316", "에너지": "#84CC16", "소재": "#EC4899",
      "부동산": "#A78BFA", "유틸리티": "#FCD34D",
    };

    function getSectorData(date, allData) {
      const map = {};
      allData.filter(d => d.date === date).forEach(d => {
        map[d.sector] = (map[d.sector] || 0) + d.weight;
      });
      return Object.entries(map)
        .map(([name, value]) => ({ name, value: +value.toFixed(2) }))
        .sort((a, b) => b.value - a.value);
    }

    function getRankChanges(today, yesterday, allData) {
      const todayData = allData.filter(d => d.date === today).sort((a, b) => a.rank - b.rank);
      const yestMap = {};
      allData.filter(d => d.date === yesterday).forEach(d => { yestMap[d.ticker] = d.rank; });
      return todayData.map(d => ({
        ...d,
        prevRank: yestMap[d.ticker],
        rankChange: yestMap[d.ticker] !== undefined ? yestMap[d.ticker] - d.rank : null,
      }));
    }

    function getNewAndExited(today, yesterday, allData) {
      const todaySet = new Set(allData.filter(d => d.date === today).map(d => d.ticker));
      const yestSet  = new Set(allData.filter(d => d.date === yesterday).map(d => d.ticker));
      return {
        newEntries: [...todaySet].filter(t => !yestSet.has(t)),
        exited:     [...yestSet].filter(t => !todaySet.has(t)),
      };
    }

    const BarTooltip = ({ active, payload }) => {
      if (!active || !payload?.length) return null;
      const d = payload[0].payload;
      return (
        <div style={{ background: "#0F1923", border: "1px solid #1E3A5F", borderRadius: 8, padding: "10px 14px" }}>
          <div style={{ color: "#E2B96A", fontWeight: 700, fontSize: 15 }}>{d.ticker}</div>
          <div style={{ color: "#94A3B8", fontSize: 13 }}>{d.name}</div>
          <div style={{ color: "#fff", fontWeight: 600, marginTop: 4 }}>{Number(d.weight).toFixed(2)}%</div>
        </div>
      );
    };

    const card = {
      background: "rgba(14,28,46,0.5)", border: "1px solid #1E3A5F",
      borderRadius: 12, padding: 24,
    };

    function App() {
      const [allData,     setAllData]     = useState([]);
      const [loading,     setLoading]     = useState(true);
      const [error,       setError]       = useState(null);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [selDate,     setSelDate]     = useState(null);
      const [selTicker,   setSelTicker]   = useState("NVDA");
      const [activeTab,   setActiveTab]   = useState("overview");

      useEffect(() => {
        (async () => {
          try {
            const res  = await fetch(APPS_SCRIPT_URL);
            const json = await res.json();
            if (json.success && json.data) {
              setAllData(json.data);
              setLastUpdated(new Date().toLocaleString("ko-KR"));
            } else {
              setError("데이터를 불러올 수 없습니다.");
            }
          } catch(e) {
            setError("API 연결 실패: " + e.message);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      const dates       = [...new Set(allData.map(d => d.date))].sort().reverse();
      const currentDate = selDate || dates[0] || "";
      const prevDate    = dates[dates.indexOf(currentDate) + 1] || currentDate;

      const todayData   = allData.filter(d => d.date === currentDate).sort((a,b) => a.rank - b.rank);
      const top10       = todayData.slice(0, 10);
      const sectorData  = getSectorData(currentDate, allData);
      const withChanges = getRankChanges(currentDate, prevDate, allData);
      const { newEntries, exited } = getNewAndExited(currentDate, prevDate, allData);
      const trendData   = allData
        .filter(d => d.ticker === selTicker)
        .sort((a,b) => a.date.localeCompare(b.date))
        .map(d => ({ date: d.date.slice(5), weight: d.weight, rank: d.rank }));

      const top3Weight = top10.slice(0,3).reduce((s,d) => s + d.weight, 0);
      const itWeight   = sectorData.find(s => s.name === "IT")?.value || 0;

      if (loading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:16, background:"linear-gradient(135deg,#060D14,#0B1623)", fontFamily:"monospace" }}>
          <div style={{ width:52, height:52, borderRadius:12, background:"linear-gradient(135deg,#E2B96A,#C8962E)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:18, color:"#060D14", animation:"pulse 1.4s infinite" }}>IVV</div>
          <div style={{ color:"#4A6580", fontSize:13, letterSpacing:3 }}>LOADING DATA...</div>
        </div>
      );

      if (error) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:14, background:"linear-gradient(135deg,#060D14,#0B1623)", fontFamily:"monospace", padding:40 }}>
          <div style={{ color:"#EF4444", fontSize:16, textAlign:"center" }}>⚠ {error}</div>
          <div style={{ color:"#4A6580", fontSize:12, maxWidth:460, textAlign:"center", lineHeight:1.8 }}>
            1. <code style={{color:"#E2B96A"}}>APPS_SCRIPT_URL</code> 값을 Apps Script 웹앱 URL로 교체했는지 확인<br/>
            2. Apps Script 배포 시 <strong style={{color:"#fff"}}>액세스: 모든 사용자(익명 포함)</strong> 으로 설정했는지 확인
          </div>
        </div>
      );

      return (
        <div style={{ fontFamily:"'Courier New',monospace", background:"linear-gradient(135deg,#060D14 0%,#0B1623 50%,#0E1C2E 100%)", minHeight:"100vh", color:"#E2E8F0" }}>

          {/* 헤더 */}
          <div style={{ borderBottom:"1px solid #1E3A5F", padding:"18px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(14,28,46,0.85)", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ width:40, height:40, borderRadius:10, background:"linear-gradient(135deg,#E2B96A,#C8962E)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:17, color:"#060D14" }}>IVV</div>
              <div>
                <div style={{ fontWeight:700, fontSize:17, color:"#F1F5F9" }}>iShares Russell Top 200 ETF</div>
                <div style={{ fontSize:11, color:"#4A6580", letterSpacing:2.5 }}>HOLDINGS DASHBOARD · TOP 30</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:12, color:"#4A6580" }}>기준일</span>
              <select value={currentDate} onChange={e => setSelDate(e.target.value)} style={{ background:"#0F1923", border:"1px solid #1E3A5F", color:"#E2B96A", borderRadius:6, padding:"5px 12px", fontSize:13, fontFamily:"inherit", cursor:"pointer" }}>
                {dates.map(d => <option key={d} value={d}>{d}</option>)}
              </select>
              <div style={{ padding:"5px 12px", borderRadius:6, background:"rgba(226,185,106,0.1)", border:"1px solid rgba(226,185,106,0.3)", fontSize:12, color:"#E2B96A" }}>● LIVE</div>
            </div>
          </div>

          {/* 탭 */}
          <div style={{ display:"flex", borderBottom:"1px solid #1E3A5F", padding:"0 32px", background:"rgba(6,13,20,0.5)" }}>
            {[
              { id:"overview", label:"오늘 스냅샷" },
              { id:"sector",   label:"섹터 구성" },
              { id:"trend",    label:"순위·비중 추이" },
              { id:"changes",  label:"신규진입·이탈" },
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ background:"none", border:"none", cursor:"pointer", padding:"13px 20px", fontSize:13, fontFamily:"inherit", color:activeTab===tab.id?"#E2B96A":"#4A6580", borderBottom:activeTab===tab.id?"2px solid #E2B96A":"2px solid transparent", marginBottom:-1, transition:"all 0.2s" }}>
                {tab.label}
              </button>
            ))}
          </div>

          {/* KPI 카드 */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", borderBottom:"1px solid #1E3A5F" }}>
            {[
              { label:"Top 3 집중도",  value:`${top3Weight.toFixed(1)}%`, sub:"NVDA · AAPL · MSFT" },
              { label:"IT 섹터 비중",  value:`${itWeight.toFixed(1)}%`,    sub:"전체 섹터 중 최고" },
              { label:"신규 진입",     value:`${newEntries.length}개`,      sub:newEntries.length ? newEntries.join(", ") : "변동 없음" },
              { label:"이탈 종목",     value:`${exited.length}개`,          sub:exited.length ? exited.join(", ") : "변동 없음" },
            ].map((c,i) => (
              <div key={i} style={{ padding:"20px 28px", borderRight:i<3?"1px solid #1E3A5F":"none", background:"rgba(14,28,46,0.3)" }}>
                <div style={{ fontSize:11, color:"#4A6580", letterSpacing:2, textTransform:"uppercase", marginBottom:8 }}>{c.label}</div>
                <div style={{ fontSize:26, fontWeight:700, color:"#E2B96A" }}>{c.value}</div>
                <div style={{ fontSize:11, color:"#4A6580", marginTop:4 }}>{c.sub}</div>
              </div>
            ))}
          </div>

          {/* 콘텐츠 */}
          <div style={{ padding:"28px 32px" }}>

            {/* 탭1: 오늘 스냅샷 */}
            {activeTab === "overview" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1.3fr", gap:24 }}>
                <div style={card}>
                  <div style={{ fontSize:13, color:"#E2B96A", letterSpacing:2, marginBottom:20 }}>▸ TOP 10 종목 비중</div>
                  <ResponsiveContainer width="100%" height={340}>
                    <BarChart data={top10} layout="vertical" margin={{ left:8, right:24 }}>
                      <XAxis type="number" tick={{ fill:"#4A6580", fontSize:11 }} axisLine={false} tickLine={false} />
                      <YAxis type="category" dataKey="ticker" tick={{ fill:"#94A3B8", fontSize:12, fontWeight:600 }} axisLine={false} tickLine={false} width={50} />
                      <Tooltip content={<BarTooltip />} />
                      <Bar dataKey="weight" radius={[0,4,4,0]}>
                        {top10.map((_,i) => <Cell key={i} fill={i===0?"#E2B96A":i<3?"#3B82F6":"#1E3A5F"} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

                <div style={{ ...card, overflowY:"auto", maxHeight:430 }}>
                  <div style={{ fontSize:13, color:"#E2B96A", letterSpacing:2, marginBottom:16 }}>▸ TOP 30 전체 목록</div>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead>
                      <tr style={{ color:"#4A6580", borderBottom:"1px solid #1E3A5F" }}>
                        {["#","티커","종목명","섹터","비중","변동"].map(h => (
                          <th key={h} style={{ padding:"6px 8px", textAlign:"left", fontWeight:400, letterSpacing:1 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {withChanges.map((d,i) => {
                        const rc = d.rankChange;
                        return (
                          <tr key={d.ticker} style={{ borderBottom:"1px solid rgba(30,58,95,0.4)", background:i%2===0?"transparent":"rgba(14,28,46,0.3)" }}>
                            <td style={{ padding:"7px 8px", color:"#4A6580" }}>{d.rank}</td>
                            <td style={{ padding:"7px 8px", color:"#E2B96A", fontWeight:700 }}>{d.ticker}</td>
                            <td style={{ padding:"7px 8px", color:"#94A3B8" }}>{d.name}</td>
                            <td style={{ padding:"7px 8px" }}>
                              <span style={{ background:(SECTOR_COLORS[d.sector]||"#4A6580")+"20", color:SECTOR_COLORS[d.sector]||"#4A6580", padding:"2px 6px", borderRadius:4, fontSize:10 }}>{d.sector}</span>
                            </td>
                            <td style={{ padding:"7px 8px", color:"#F1F5F9", fontWeight:600 }}>{Number(d.weight).toFixed(2)}%</td>
                            <td style={{ padding:"7px 8px", fontWeight:700, color:rc===null?"#4A6580":rc>0?"#10B981":rc<0?"#EF4444":"#4A6580" }}>
                              {rc===null?"NEW":rc>0?`▲${rc}`:rc<0?`▼${Math.abs(rc)}`:"─"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* 탭2: 섹터 구성 */}
            {activeTab === "sector" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
                <div style={card}>
                  <div style={{ fontSize:13, color:"#E2B96A", letterSpacing:2, marginBottom:20 }}>▸ 섹터별 비중 (%)</div>
                  <ResponsiveContainer width="100%" height={360}>
                    <PieChart>
                      <Pie data={sectorData} cx="50%" cy="50%" innerRadius={80} outerRadius={140} paddingAngle={3} dataKey="value"
                        label={({ name, value }) => `${name} ${value}%`}
                        labelLine={{ stroke:"#1E3A5F" }}>
                        {sectorData.map((entry,i) => <Cell key={i} fill={SECTOR_COLORS[entry.name]||"#4A6580"} />)}
                      </Pie>
                      <Tooltip formatter={v => [`${v}%`,"비중"]} contentStyle={{ background:"#0F1923", border:"1px solid #1E3A5F", borderRadius:8 }} />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
                <div style={card}>
                  <div style={{ fontSize:13, color:"#E2B96A", letterSpacing:2, marginBottom:20 }}>▸ 섹터 순위</div>
                  {sectorData.map(s => (
                    <div key={s.name} style={{ marginBottom:14 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                        <span style={{ fontSize:13, color:"#94A3B8" }}>
                          <span style={{ color:SECTOR_COLORS[s.name]||"#4A6580", marginRight:8 }}>●</span>{s.name}
                        </span>
                        <span style={{ fontSize:13, fontWeight:700, color:"#E2B96A" }}>{s.value}%</span>
                      </div>
                      <div style={{ background:"#0F1923", borderRadius:4, height:6 }}>
                        <div style={{ width:`${(s.value/sectorData[0].value)*100}%`, height:"100%", borderRadius:4, background:SECTOR_COLORS[s.name]||"#4A6580", transition:"width 0.5s ease" }} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 탭3: 순위·비중 추이 */}
            {activeTab === "trend" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
                <div style={card}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
                    <div style={{ fontSize:13, color:"#E2B96A", letterSpacing:2 }}>▸ 비중 추이</div>
                    <select value={selTicker} onChange={e => setSelTicker(e.target.value)} style={{ background:"#0F1923", border:"1px solid #1E3A5F", color:"#E2B96A", borderRadius:6, padding:"4px 10px", fontSize:12, fontFamily:"inherit", cursor:"pointer" }}>
                      {todayData.map(d => <option key={d.ticker} value={d.ticker}>{d.ticker}</option>)}
                    </select>
                  </div>
                  <ResponsiveContainer width="100%" height={300}>
                    <AreaChart data={trendData}>
                      <defs>
                        <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%"  stopColor="#3B82F6" stopOpacity={0.3} />
                          <stop offset="95%" stopColor="#3B82F6" stopOpacity={0} />
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1E3A5F" />
                      <XAxis dataKey="date" tick={{ fill:"#4A6580", fontSize:11 }} />
                      <YAxis tick={{ fill:"#4A6580", fontSize:11 }} />
                      <Tooltip contentStyle={{ background:"#0F1923", border:"1px solid #1E3A5F", borderRadius:8 }} formatter={v => [`${v}%`,"비중"]} />
                      <Area type="monotone" dataKey="weight" stroke="#3B82F6" fill="url(#wGrad)" strokeWidth={2} dot={{ fill:"#E2B96A", r:4 }} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
                <div style={card}>
                  <div style={{ fontSize:13, color:"#E2B96A", letterSpacing:2, marginBottom:20 }}>▸ 순위 추이 — {selTicker}</div>
                  <ResponsiveContainer width="100%" height={300}>
                    <LineChart data={trendData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1E3A5F" />
                      <XAxis dataKey="date" tick={{ fill:"#4A6580", fontSize:11 }} />
                      <YAxis reversed tick={{ fill:"#4A6580", fontSize:11 }} />
                      <Tooltip contentStyle={{ background:"#0F1923", border:"1px solid #1E3A5F", borderRadius:8 }} formatter={v => [`${v}위`,"순위"]} />
                      <Line type="monotone" dataKey="rank" stroke="#E2B96A" strokeWidth={2} dot={{ fill:"#E2B96A", r:5 }} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}

            {/* 탭4: 신규진입·이탈 */}
            {activeTab === "changes" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
                {[
                  { label:"신규 진입 종목", tickers:newEntries, color:"#10B981", icon:"▲", dateRef:currentDate },
                  { label:"이탈 종목",      tickers:exited,     color:"#EF4444", icon:"▼", dateRef:prevDate },
                ].map(({ label, tickers, color, icon, dateRef }) => (
                  <div key={label} style={{ ...card, border:`1px solid ${color}30` }}>
                    <div style={{ fontSize:13, color, letterSpacing:2, marginBottom:20 }}>{icon} {label}</div>
                    {tickers.length === 0 ? (
                      <div style={{ color:"#4A6580", fontSize:14, padding:"20px 0" }}>변동 없음</div>
                    ) : tickers.map(ticker => {
                      const d = allData.find(x => x.ticker === ticker && x.date === dateRef);
                      return (
                        <div key={ticker} style={{ display:"flex", alignItems:"center", gap:14, padding:"12px 16px", borderRadius:8, marginBottom:8, background:`${color}10`, border:`1px solid ${color}20` }}>
                          <span style={{ color, fontWeight:900, fontSize:18, minWidth:60 }}>{ticker}</span>
                          <div>
                            <div style={{ color:"#E2E8F0", fontSize:13 }}>{d?.name||"-"}</div>
                            <div style={{ color:"#4A6580", fontSize:11 }}>{d?.sector||"-"} · {d?.weight?.toFixed(2)||"-"}%</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}

                <div style={{ ...card, gridColumn:"1 / -1" }}>
                  <div style={{ fontSize:13, color:"#E2B96A", letterSpacing:2, marginBottom:20 }}>▸ 순위 변동 TOP 5</div>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12 }}>
                    {withChanges
                      .filter(d => d.rankChange !== null && d.rankChange !== 0)
                      .sort((a,b) => Math.abs(b.rankChange) - Math.abs(a.rankChange))
                      .slice(0,5)
                      .map(d => (
                        <div key={d.ticker} style={{ background:d.rankChange>0?"rgba(16,185,129,0.08)":"rgba(239,68,68,0.08)", border:`1px solid ${d.rankChange>0?"#10B981":"#EF4444"}30`, borderRadius:10, padding:16, textAlign:"center" }}>
                          <div style={{ color:"#E2B96A", fontWeight:900, fontSize:20 }}>{d.ticker}</div>
                          <div style={{ color:"#4A6580", fontSize:11, margin:"4px 0 10px" }}>{d.name}</div>
                          <div style={{ fontSize:26, fontWeight:900, color:d.rankChange>0?"#10B981":"#EF4444" }}>
                            {d.rankChange>0?`▲${d.rankChange}`:`▼${Math.abs(d.rankChange)}`}
                          </div>
                          <div style={{ color:"#4A6580", fontSize:11, marginTop:6 }}>{d.prevRank}위 → {d.rank}위</div>
                        </div>
                      ))
                    }
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* 푸터 */}
          <div style={{ borderTop:"1px solid #1E3A5F", padding:"14px 32px", display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:11, color:"#2A3F55" }}>
            <span>iShares Russell Top 200 ETF · Holdings as of {currentDate}</span>
            <span>마지막 로드: {lastUpdated||"-"} · 매일 오후 4시 자동 갱신</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
