<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메트라이프 미국 주식형 Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060D14; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0B1623; }
    ::-webkit-scrollbar-thumb { background: #3A5A7F; border-radius: 3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .grid-2 { display: grid; grid-template-columns: 1fr 1.3fr; gap: 24px; }
    .grid-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .grid-kpi { display: grid; grid-template-columns: repeat(4,1fr); }
    .grid-returns { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; }
    .grid-top5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; }
    .grid-etf3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .content-pad { padding: 28px 32px; }
    .header-pad { padding: 18px 32px; }
    .tab-pad { padding: 0 32px; }
    .footer-pad { padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-equal { grid-template-columns: 1fr; }
      .grid-kpi { grid-template-columns: repeat(2,1fr); }
      .grid-returns { grid-template-columns: repeat(3,1fr); }
      .grid-top5 { grid-template-columns: repeat(2,1fr); }
      .grid-etf3 { grid-template-columns: 1fr; }
      .header-inner { flex-direction: column; align-items: flex-start; gap: 12px; }
      .header-right { width: 100%; justify-content: space-between; }
      .content-pad { padding: 16px; }
      .header-pad { padding: 14px 16px; }
      .tab-pad { padding: 0 8px; }
      .footer-pad { padding: 12px 16px; flex-direction: column; gap: 4px; text-align: center; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwks-Rnlr1dZ-EuPgo-zpqXdFQ1MfPYbgBMxypLbqZm-t4Gx7uKzsqXYr_IY9Sz91o/exec";

    const ETF_INFO = {
      ivv: { name: "IVV", full: "iShares Core S&P 500", color: "#E2B96A", bg: "rgba(226,185,106,0.1)", border: "rgba(226,185,106,0.3)" },
      iwo: { name: "IWO", full: "iShares Russell 2000 Growth", color: "#60A5FA", bg: "rgba(96,165,250,0.1)", border: "rgba(96,165,250,0.3)" },
      qqq: { name: "QQQ", full: "Invesco QQQ Trust", color: "#A78BFA", bg: "rgba(167,139,250,0.1)", border: "rgba(167,139,250,0.3)" },
    };

    const SECTOR_KO = {
      "Information Technology":"IT·기술","Communication":"통신","Communication Services":"통신",
      "Consumer Discretionary":"소비재","Financials":"금융","Health Care":"헬스케어",
      "Consumer Staples":"필수소비재","Industrials":"산업재","Energy":"에너지",
      "Materials":"소재","Real Estate":"부동산","Utilities":"유틸리티",
      "IT":"IT·기술","IT·기술":"IT·기술","통신":"통신","소비재":"소비재","금융":"금융",
      "헬스케어":"헬스케어","필수소비재":"필수소비재","산업재":"산업재",
      "에너지":"에너지","소재":"소재","부동산":"부동산","유틸리티":"유틸리티",
    };
    const SECTOR_COLORS = {
      "IT·기술":"#3B82F6","통신":"#8B5CF6","소비재":"#F59E0B","금융":"#10B981",
      "헬스케어":"#EF4444","필수소비재":"#06B6D4","산업재":"#F97316","에너지":"#84CC16",
      "소재":"#EC4899","부동산":"#A78BFA","유틸리티":"#FCD34D",
    };
    function toKo(s) { return SECTOR_KO[s] || s; }

    function getDateRange(daysAgo) {
      if (!daysAgo) return "상장일~현재";
      const today = new Date();
      const past = new Date(today);
      past.setDate(past.getDate() - daysAgo);
      const fmt = d => `${String(d.getFullYear()).slice(2)}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
      return `${fmt(past)}~${fmt(today)}`;
    }

    function getSectorData(date, allData) {
      const map = {};
      allData.filter(d => d.date===date).forEach(d => {
        const ko = toKo(d.sector);
        map[ko] = (map[ko]||0) + d.weight;
      });
      return Object.entries(map).map(([name,value]) => ({name,value:+value.toFixed(2)})).sort((a,b) => b.value-a.value);
    }
    function getRankChanges(today, yesterday, allData) {
      const todayData = allData.filter(d => d.date===today).sort((a,b) => a.rank-b.rank);
      const yestMap = {};
      allData.filter(d => d.date===yesterday).forEach(d => { yestMap[d.ticker]=d.rank; });
      return todayData.map(d => ({...d, sectorKo:toKo(d.sector), prevRank:yestMap[d.ticker], rankChange:yestMap[d.ticker]!==undefined?yestMap[d.ticker]-d.rank:null}));
    }
    function getNewAndExited(today, yesterday, allData) {
      const todaySet = new Set(allData.filter(d => d.date===today).map(d => d.ticker));
      const yestSet  = new Set(allData.filter(d => d.date===yesterday).map(d => d.ticker));
      return { newEntries:[...todaySet].filter(t => !yestSet.has(t)), exited:[...yestSet].filter(t => !todaySet.has(t)) };
    }

    const BarTooltip = ({active,payload}) => {
      if (!active||!payload||!payload.length) return null;
      const d = payload[0].payload;
      return (
        <div style={{background:"#0F1923",border:"1px solid #3A5A7F",borderRadius:8,padding:"10px 14px"}}>
          <div style={{color:"#E2B96A",fontWeight:700,fontSize:15}}>{d.ticker}</div>
          <div style={{color:"#CBD5E1",fontSize:13}}>{d.name}</div>
          <div style={{color:"#fff",fontWeight:600,marginTop:4}}>{Number(d.weight).toFixed(2)}%</div>
        </div>
      );
    };

    const card = {background:"rgba(14,28,46,0.7)",border:"1px solid #2A4A6F",borderRadius:14,padding:24};

    function ReturnCard({label, value, dateRange}) {
      if (value === null || value === undefined) return (
        <div style={{background:"rgba(14,28,46,0.7)",border:"1px solid #2A4A6F",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
          <div style={{fontSize:11,color:"#94A3B8",marginBottom:4,letterSpacing:1}}>{label}</div>
          <div style={{fontSize:9,color:"#4A6580",marginBottom:6}}>{dateRange||""}</div>
          <div style={{fontSize:18,fontWeight:700,color:"#4A6580"}}>-</div>
        </div>
      );
      const isPos = value >= 0;
      return (
        <div style={{background:isPos?"rgba(16,185,129,0.08)":"rgba(239,68,68,0.08)",border:"1px solid "+(isPos?"#10B981":"#EF4444")+"40",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
          <div style={{fontSize:11,color:"#94A3B8",marginBottom:4,letterSpacing:1}}>{label}</div>
          <div style={{fontSize:9,color:"#4A6580",marginBottom:6}}>{dateRange||""}</div>
          <div style={{fontSize:20,fontWeight:800,color:isPos?"#10B981":"#EF4444"}}>
            {isPos?"+":""}{value}%
          </div>
        </div>
      );
    }

    // 단일 ETF 탭 콘텐츠
    function ETFContent({ allData, etfKey }) {
      const [selDate, setSelDate] = useState(null);
      const [activeTab, setActiveTab] = useState("overview");
      const info = ETF_INFO[etfKey];

      const dates = [...new Set(allData.map(d => d.date))].sort().reverse();
      const currentDate = selDate||dates[0]||"";
      const prevDate = dates[dates.indexOf(currentDate)+1]||currentDate;
      const todayData = allData.filter(d => d.date===currentDate).sort((a,b) => a.rank-b.rank);
      const top10 = todayData.slice(0,10);
      const sectorData = getSectorData(currentDate, allData);
      const withChanges = getRankChanges(currentDate, prevDate, allData);
      const {newEntries, exited} = getNewAndExited(currentDate, prevDate, allData);
      const top3Weight = top10.slice(0,3).reduce((s,d) => s+d.weight, 0);
      const itData = sectorData.find(s => s.name==="IT·기술");
      const itWeight = itData?itData.value:0;

      return (
        <div>
          {/* 날짜 선택 */}
          <div style={{padding:"10px 32px",borderBottom:"1px solid #2A4A6F",background:"rgba(6,13,20,0.5)",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,color:"#CBD5E1"}}>기준일</span>
            <select value={currentDate} onChange={e => setSelDate(e.target.value)} style={{background:"#0F1923",border:"1px solid #2A4A6F",color:info.color,borderRadius:6,padding:"5px 10px",fontSize:13,fontFamily:"inherit",cursor:"pointer"}}>
              {dates.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>

          {/* 탭 */}
          <div className="tab-pad" style={{display:"flex",borderBottom:"1px solid #2A4A6F",background:"rgba(6,13,20,0.7)",overflowX:"auto"}}>
            {[{id:"overview",label:"오늘 스냅샷"},{id:"sector",label:"섹터 구성"},{id:"changes",label:"진입·이탈"}].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"14px 20px",fontSize:14,fontFamily:"inherit",fontWeight:activeTab===tab.id?700:400,color:activeTab===tab.id?info.color:"#CBD5E1",borderBottom:activeTab===tab.id?"2px solid "+info.color:"2px solid transparent",marginBottom:-1,transition:"all 0.2s",whiteSpace:"nowrap"}}>{tab.label}</button>
            ))}
          </div>

          {/* KPI */}
          <div className="grid-kpi" style={{borderBottom:"1px solid #2A4A6F"}}>
            {[
              {label:"Top 3 집중도",value:top3Weight.toFixed(1)+"%",sub:top10.slice(0,3).map(d=>d.ticker).join(" · "),color:info.color},
              {label:"IT 섹터 비중",value:itWeight.toFixed(1)+"%",sub:"전체 섹터 중 최고",color:"#3B82F6"},
              {label:"신규 진입",value:newEntries.length+"개",sub:newEntries.length?newEntries.slice(0,3).join(", "):"변동 없음",color:"#10B981"},
              {label:"이탈 종목",value:exited.length+"개",sub:exited.length?exited.slice(0,3).join(", "):"변동 없음",color:"#EF4444"},
            ].map((c,i) => (
              <div key={i} style={{padding:"20px 24px",borderRight:i%2===0?"1px solid #2A4A6F":"none",background:"rgba(14,28,46,0.4)"}}>
                <div style={{fontSize:11,color:"#94A3B8",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>{c.label}</div>
                <div style={{fontSize:28,fontWeight:800,color:c.color}}>{c.value}</div>
                <div style={{fontSize:12,color:"#CBD5E1",marginTop:5}}>{c.sub}</div>
              </div>
            ))}
          </div>

          <div className="content-pad">
            {activeTab==="overview" && (
              <div className="grid-2">
                <div style={card}>
                  <div style={{fontSize:14,color:info.color,fontWeight:700,letterSpacing:1,marginBottom:20}}>▸ TOP 10 종목 비중</div>
                  <ResponsiveContainer width="100%" height={320}>
                    <BarChart data={top10} layout="vertical" margin={{left:8,right:24}}>
                      <XAxis type="number" tick={{fill:"#94A3B8",fontSize:11}} axisLine={false} tickLine={false}/>
                      <YAxis type="category" dataKey="ticker" tick={{fill:"#FFFFFF",fontSize:12,fontWeight:700}} axisLine={false} tickLine={false} width={52}/>
                      <Tooltip content={<BarTooltip/>}/>
                      <Bar dataKey="weight" radius={[0,5,5,0]}>
                        {top10.map((_,i) => <Cell key={i} fill={i===0?info.color:i<3?"#3B82F6":"#1E3A5F"}/>)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{...card,overflowY:"auto",maxHeight:430}}>
                  <div style={{fontSize:14,color:info.color,fontWeight:700,letterSpacing:1,marginBottom:16}}>▸ TOP 30 전체 목록</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{borderBottom:"1px solid #2A4A6F"}}>
                        {["#","티커","종목명","섹터","비중","변동"].map(h => (
                          <th key={h} className={h==="종목명"||h==="섹터"?"hide-mobile":""} style={{padding:"6px 8px",textAlign:"left",fontWeight:600,color:"#CBD5E1",fontSize:11,letterSpacing:1}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {withChanges.map((d,i) => {
                        const rc=d.rankChange; const sc=SECTOR_COLORS[d.sectorKo]||"#4A6580";
                        return (
                          <tr key={d.ticker} style={{borderBottom:"1px solid rgba(42,74,111,0.4)",background:i%2===0?"transparent":"rgba(14,28,46,0.4)"}}>
                            <td style={{padding:"8px",color:"#94A3B8",fontSize:12}}>{d.rank}</td>
                            <td style={{padding:"8px",color:info.color,fontWeight:800,fontSize:13}}>{d.ticker}</td>
                            <td className="hide-mobile" style={{padding:"8px",color:"#E2E8F0",fontSize:12}}>{d.name}</td>
                            <td className="hide-mobile" style={{padding:"8px"}}>
                              <span style={{background:sc+"25",color:sc,padding:"3px 8px",borderRadius:5,fontSize:11,fontWeight:600}}>{d.sectorKo}</span>
                            </td>
                            <td style={{padding:"8px",color:"#FFFFFF",fontWeight:700,fontSize:13}}>{Number(d.weight).toFixed(2)}%</td>
                            <td style={{padding:"8px",fontWeight:800,fontSize:13,color:rc===null?"#94A3B8":rc>0?"#10B981":rc<0?"#EF4444":"#94A3B8"}}>
                              {rc===null?"NEW":rc>0?"▲"+rc:rc<0?"▼"+Math.abs(rc):"─"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab==="sector" && (
              <div className="grid-equal">
                <div style={card}>
                  <div style={{fontSize:14,color:info.color,fontWeight:700,letterSpacing:1,marginBottom:20}}>▸ 섹터별 비중 (%)</div>
                  <ResponsiveContainer width="100%" height={320}>
                    <PieChart>
                      <Pie data={sectorData} cx="50%" cy="50%" innerRadius={65} outerRadius={115} paddingAngle={3} dataKey="value"
                        label={({name,value}) => name+" "+value+"%"} labelLine={{stroke:"#3A5A7F"}}>
                        {sectorData.map((e,i) => <Cell key={i} fill={SECTOR_COLORS[e.name]||"#4A6580"}/>)}
                      </Pie>
                      <Tooltip formatter={v => [v+"%","비중"]} contentStyle={{background:"#0F1923",border:"1px solid #2A4A6F",borderRadius:8,color:"#fff"}}/>
                    </PieChart>
                  </ResponsiveContainer>
                </div>
                <div style={card}>
                  <div style={{fontSize:14,color:info.color,fontWeight:700,letterSpacing:1,marginBottom:20}}>▸ 섹터 순위</div>
                  {sectorData.map((s,i) => (
                    <div key={s.name} style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:12,color:"#94A3B8",minWidth:20,fontWeight:600}}>#{i+1}</span>
                          <span style={{color:SECTOR_COLORS[s.name]||"#4A6580",fontSize:16}}>●</span>
                          <span style={{fontSize:13,color:"#FFFFFF",fontWeight:600}}>{s.name}</span>
                        </div>
                        <span style={{fontSize:15,fontWeight:800,color:SECTOR_COLORS[s.name]||"#E2B96A"}}>{s.value}%</span>
                      </div>
                      <div style={{background:"#0B1623",borderRadius:6,height:7}}>
                        <div style={{width:((s.value/sectorData[0].value)*100)+"%",height:"100%",borderRadius:6,background:SECTOR_COLORS[s.name]||"#4A6580",transition:"width 0.6s ease"}}/>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab==="changes" && (
              <div className="grid-equal">
                {[
                  {label:"신규 진입 종목",tickers:newEntries,color:"#10B981",icon:"▲",dateRef:currentDate},
                  {label:"이탈 종목",tickers:exited,color:"#EF4444",icon:"▼",dateRef:prevDate},
                ].map(({label,tickers,color,icon,dateRef}) => (
                  <div key={label} style={{...card,border:"1px solid "+color+"40"}}>
                    <div style={{fontSize:14,color:color,fontWeight:700,letterSpacing:1,marginBottom:20}}>{icon} {label}</div>
                    {tickers.length===0
                      ? <div style={{color:"#CBD5E1",fontSize:14,padding:"20px 0"}}>변동 없음</div>
                      : tickers.map(ticker => {
                          const d = allData.find(x => x.ticker===ticker&&x.date===dateRef);
                          return (
                            <div key={ticker} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",borderRadius:10,marginBottom:10,background:color+"15",border:"1px solid "+color+"30"}}>
                              <span style={{color:color,fontWeight:900,fontSize:18,minWidth:56}}>{ticker}</span>
                              <div>
                                <div style={{color:"#FFFFFF",fontSize:13,fontWeight:600}}>{d?d.name:"-"}</div>
                                <div style={{color:"#CBD5E1",fontSize:12,marginTop:3}}>{d?toKo(d.sector):"-"} · {d?d.weight.toFixed(2):"-"}%</div>
                              </div>
                            </div>
                          );
                        })
                    }
                  </div>
                ))}
                <div style={{...card,gridColumn:"1 / -1"}}>
                  <div style={{fontSize:14,color:info.color,fontWeight:700,letterSpacing:1,marginBottom:20}}>▸ 순위 변동 TOP 5</div>
                  <div className="grid-top5">
                    {withChanges.filter(d => d.rankChange!==null&&d.rankChange!==0).sort((a,b) => Math.abs(b.rankChange)-Math.abs(a.rankChange)).slice(0,5).map(d => (
                      <div key={d.ticker} style={{background:d.rankChange>0?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)",border:"1px solid "+(d.rankChange>0?"#10B981":"#EF4444")+"40",borderRadius:12,padding:16,textAlign:"center"}}>
                        <div style={{color:info.color,fontWeight:900,fontSize:20}}>{d.ticker}</div>
                        <div className="hide-mobile" style={{color:"#CBD5E1",fontSize:12,margin:"5px 0 10px"}}>{d.name}</div>
                        <div style={{fontSize:26,fontWeight:900,color:d.rankChange>0?"#10B981":"#EF4444"}}>{d.rankChange>0?"▲"+d.rankChange:"▼"+Math.abs(d.rankChange)}</div>
                        <div style={{color:"#CBD5E1",fontSize:12,marginTop:6}}>{d.prevRank}위 → {d.rank}위</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [apiData, setApiData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [activeETF, setActiveETF] = useState("all");

      useEffect(() => {
        fetch(APPS_SCRIPT_URL)
          .then(res => res.json())
          .then(json => {
            if (json.success) {
              setApiData(json);
              setLastUpdated(new Date().toLocaleString("ko-KR"));
            } else {
              setError("데이터를 불러올 수 없습니다.");
            }
          })
          .catch(e => setError("API 연결 실패: "+e.message))
          .finally(() => setLoading(false));
      }, []);

      if (loading) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"linear-gradient(135deg,#060D14,#0B1623)",fontFamily:"monospace"}}>
          <div style={{width:52,height:52,borderRadius:12,background:"linear-gradient(135deg,#E2B96A,#C8962E)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"#060D14",animation:"pulse 1.4s infinite",textAlign:"center",lineHeight:1.3}}>미국<br/>주식형</div>
          <div style={{color:"#94A3B8",fontSize:13,letterSpacing:3}}>LOADING DATA...</div>
        </div>
      );
      if (error) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,background:"linear-gradient(135deg,#060D14,#0B1623)",fontFamily:"monospace",padding:40}}>
          <div style={{color:"#EF4444",fontSize:16,textAlign:"center"}}>⚠ {error}</div>
        </div>
      );

      const ivvData = apiData?.data || [];
      const iwoData = apiData?.iwoData || [];
      const qqqData = apiData?.qqqData || [];
      const ivvR = apiData?.returns;
      const iwoR = apiData?.iwoReturns;
      const qqqR = apiData?.qqqReturns;

      const PERIOD_DAYS = [1, 7, 30, 90, 365, null];
      const PERIOD_LABELS = ["일간","주간","월간","분기","연간","전체기간"];
      const PERIOD_KEYS = ["daily","weekly","monthly","quarterly","annual","inception"];

      return (
        <div style={{fontFamily:"'Courier New',monospace",background:"linear-gradient(135deg,#060D14 0%,#0B1623 50%,#0E1C2E 100%)",minHeight:"100vh",color:"#F1F5F9"}}>

          {/* 헤더 */}
          <div style={{borderBottom:"1px solid #2A4A6F",background:"rgba(14,28,46,0.92)",position:"sticky",top:0,zIndex:100}}>
            <div className="header-pad header-inner">
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#E2B96A,#C8962E)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:11,color:"#060D14",flexShrink:0,textAlign:"center",lineHeight:1.3}}>메트<br/>라이프</div>
                <div>
                  <div style={{fontWeight:700,fontSize:16,color:"#FFFFFF"}}>메트라이프 미국 주식형</div>
                  <div className="hide-mobile" style={{fontSize:11,color:"#94A3B8",letterSpacing:2}}>IVV · IWO · QQQ DASHBOARD</div>
                </div>
              </div>
              <div className="header-right">
                <div style={{padding:"5px 10px",borderRadius:6,background:"rgba(226,185,106,0.15)",border:"1px solid rgba(226,185,106,0.4)",fontSize:12,color:"#E2B96A",fontWeight:700}}>● LIVE</div>
              </div>
            </div>
          </div>

          {/* ETF 선택 탭 */}
          <div style={{padding:"14px 32px",borderBottom:"1px solid #2A4A6F",background:"rgba(6,13,20,0.8)",display:"flex",gap:10,overflowX:"auto"}}>
            {[
              {id:"all", label:"전체 비교"},
              {id:"ivv", label:"IVV (S&P500)"},
              {id:"iwo", label:"IWO (Russell2000)"},
              {id:"qqq", label:"QQQ (나스닥100)"},
            ].map(e => (
              <button key={e.id} onClick={() => setActiveETF(e.id)} style={{
                background: activeETF===e.id ? "rgba(226,185,106,0.2)" : "rgba(14,28,46,0.5)",
                border: activeETF===e.id ? "1px solid #E2B96A" : "1px solid #2A4A6F",
                borderRadius:8, padding:"8px 16px",
                color: activeETF===e.id ? "#E2B96A" : "#CBD5E1",
                fontWeight: activeETF===e.id ? 700 : 400,
                fontSize:13, cursor:"pointer", fontFamily:"inherit",
                transition:"all 0.2s", whiteSpace:"nowrap",
              }}>{e.label}</button>
            ))}
          </div>

          {/* 수익률 배너 */}
          {activeETF === "all" ? (
            <div style={{padding:"20px 32px",borderBottom:"1px solid #2A4A6F",background:"rgba(6,13,20,0.6)"}}>
              <div style={{fontSize:11,color:"#94A3B8",letterSpacing:2,marginBottom:16}}>3개 ETF 수익률 비교 · 오늘 기준</div>
              <div className="grid-etf3">
                {[["ivv",ivvR],["iwo",iwoR],["qqq",qqqR]].map(([key, r]) => {
                  const info = ETF_INFO[key];
                  return (
                    <div key={key} style={{background:info.bg,border:`1px solid ${info.border}`,borderRadius:12,padding:20}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                        <div>
                          <div style={{color:info.color,fontWeight:900,fontSize:22}}>{info.name}</div>
                          <div style={{color:"#94A3B8",fontSize:10,marginTop:2}}>{info.full}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{color:"#FFFFFF",fontWeight:700,fontSize:18}}>{r?"$"+r.price:"-"}</div>
                          <div style={{marginTop:2,fontSize:12}}>일간 <span style={{color:r&&r.daily>=0?"#10B981":"#EF4444",fontWeight:800}}>{r?(r.daily>=0?"+":"")+r.daily+"%":"-"}</span></div>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        {[{label:"주간",k:"weekly",days:7},{label:"월간",k:"monthly",days:30},{label:"분기",k:"quarterly",days:90},{label:"연간",k:"annual",days:365}].map(({label,k,days}) => {
                          const val = r?r[k]:null;
                          const pos = val && val >= 0;
                          return (
                            <div key={label} style={{background:"rgba(0,0,0,0.25)",borderRadius:6,padding:"8px 10px"}}>
                              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                                <span style={{fontSize:11,color:"#94A3B8",fontWeight:700}}>{label}</span>
                                <span style={{fontSize:9,color:"#4A6580"}}>{getDateRange(days)}</span>
                              </div>
                              <span style={{color:val===null?"#4A6580":pos?"#10B981":"#EF4444",fontWeight:800,fontSize:15}}>
                                {val===null?"-":(pos?"+":"")+val+"%"}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            <div style={{padding:"16px 32px",borderBottom:"1px solid #2A4A6F",background:"rgba(6,13,20,0.6)"}}>
              {(() => {
                const info = ETF_INFO[activeETF];
                const r = activeETF==="ivv"?ivvR:activeETF==="iwo"?iwoR:qqqR;
                return (
                  <div>
                    <div style={{fontSize:11,color:"#94A3B8",letterSpacing:2,marginBottom:12}}>
                      {info.full} 수익률 현황 · 현재가 <span style={{color:info.color,fontWeight:700,fontSize:14}}>{r?"$"+r.price:"-"}</span>
                    </div>
                    <div className="grid-returns">
                      {PERIOD_LABELS.map((label,i) => (
                        <ReturnCard key={label} label={label} value={r?r[PERIOD_KEYS[i]]:null} dateRange={getDateRange(PERIOD_DAYS[i])} />
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* ETF별 콘텐츠 */}
          {activeETF === "all" && (
            <div style={{padding:"40px 32px",textAlign:"center",color:"#4A6580",fontSize:14}}>
              <div style={{...card,display:"inline-block",padding:"30px 60px"}}>
                📊 개별 ETF를 선택하면 상세 데이터를 볼 수 있어요<br/>
                <span style={{fontSize:12,color:"#4A6580",marginTop:8,display:"block"}}>IVV · IWO · QQQ 탭을 클릭해보세요</span>
              </div>
            </div>
          )}
          {activeETF === "ivv" && <ETFContent allData={ivvData} etfKey="ivv" />}
          {activeETF === "iwo" && <ETFContent allData={iwoData} etfKey="iwo" />}
          {activeETF === "qqq" && <ETFContent allData={qqqData} etfKey="qqq" />}

          <div className="footer-pad" style={{borderTop:"1px solid #2A4A6F",fontSize:11,color:"#64748B"}}>
            <span>메트라이프 미국 주식형 · IVV · IWO · QQQ</span>
            <span>마지막 로드: {lastUpdated||"-"} · 매일 오후 4시 자동 갱신</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
